interface:
  display_name: "Git 智能提交"
  short_description: "用带回退模型要求的子代理只读分析改动，主线程按 submodule 到主工程顺序提交"
  default_prompt: "使用 $git-commit 分析当前改动并直接完成提交。先启动 worker 子代理做只读 diff 分析，model 优先使用 gpt-5.3-codex-spark，如果该模型不可用则回退到 gpt-5.4-mini，reasoning_effort=xhigh、fork_context=false；不允许创建 worktree，必须使用当前 checkout / same-directory；文件过多时可启动多个 worker 并行分析不同目录或 submodule。子代理不得写文件或执行 git 写操作；主线程复核后按 submodule 到主工程顺序 stage 和 commit。"
