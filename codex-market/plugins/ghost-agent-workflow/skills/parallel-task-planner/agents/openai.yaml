interface:
  display_name: "并发任务规划"
  short_description: "将自然语言或文档转为包含完整模型配置的版本化安全并发任务计划"
  default_prompt: "使用 $parallel-task-planner 为 Codex 生成带 planner、plan_format_version 和 execution_platform 的并发计划，写出每个 module 的完整 worker_profile 和 reviewer_subagent_profile，并仅在 parallel_safe 时交给 $thread-coordination。"
